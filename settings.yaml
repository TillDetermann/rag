# The default configuration file.
# More information about configuration can be found in the documentation: https://docs.privategpt.dev/
# Syntax in `private_pgt/settings/settings.py`

server:
  env_name: ${APP_ENV:ollama}
  port: ${PORT:8001}
  cors:
    enabled: true
    allow_origins: ["*"]
    allow_methods: ["*"]
    allow_headers: ["*"]
  auth:
    enabled: false
    # python -c 'import base64; print("Basic " + base64.b64encode("secret:key".encode()).decode())'
    # 'secret' is the username and 'key' is the password for basic auth by default
    # If the auth is enabled, this value must be set in the "Authorization" header of the request.
    secret: "Basic c2VjcmV0OmtleQ=="
data:
  local_ingestion:
    enabled: ${LOCAL_INGESTION_ENABLED:false}
    allow_ingest_from: ["*"]
  local_data_folder: local_data/private_gpt

ui:
  enabled: true
  path: /
  # "RAG", "Search", "Basic", or "Summarize"
  default_mode: "RAG"
  default_chat_system_prompt: >
    Temp

  default_query_system_prompt: >
    You are an expert software engineer assistant that helps users understand their codebase and documentation.

    When a user asks a question, follow this strategy:

    1. UNDERSTAND: First search the documents to understand the general context and architecture around the topic.
    2. LOCATE: Then search the code to find the specific implementation, classes, and functions involved.
    3. ANALYZE: If needed, do additional searches to find related components, error handling, edge cases, and dependencies.
    4. ANSWER: Only after gathering sufficient context, provide a comprehensive answer.

    IMPORTANT RULES:
    - Always use at least 2 different tools before answering.
    - For debugging or failure questions: find BOTH the documentation AND the code that handles the scenario.
    - Never answer based on a single search result.
    - If a search returns no results, try different keywords.
    - Cite the source files in your answer.

    Example workflow for "why does pressure build-up fail?":
    1. document_keyword_search("pressure build up fail") -> find documentation
    2. code_search("PressureBuildup") -> find the implementation
    3. code_search("error pressure timeout") -> find error handling
    4. Answer with full context from all sources

  default_summarization_system_prompt: >
    Temp

  delete_file_button_enabled: true
  delete_all_files_button_enabled: true

llm:
  mode: ollama
  # Should be matching the selected model
  max_new_tokens: 2048
  context_window: 8192
  # Select your tokenizer. Llama-index tokenizer is the default.
  # tokenizer: meta-llama/Meta-Llama-3.1-8B-Instruct
  temperature: 0.1 # The temperature of the model. Increasing the temperature will make the model answer more creatively. A value of 0.1 would be more factual. (Default: 0.1)

rag:
  similarity_top_k: 10
  #This value controls how many "top" documents the RAG returns to use in the context.
  #similarity_value: 0.45
  #This value is disabled by default.  If you enable this settings, the RAG will only use articles that meet a certain percentage score.
  rerank:
    enabled: true
    model: cross-encoder/ms-marco-MiniLM-L-12-v2
    top_n: 2

summarize:
  use_async: true

embedding:
  # Should be matching the value above in most cases
  mode: ollama
  ingest_mode: simple
  embed_dim_text: 768 # 768 is for nomic-ai/nomic-embed-text-v1.5
  embed_dim_code: 768 # 768 is for vuongnguyen2212/CodeRankEmbed

vectorstore:
  database: postgres

nodestore:
  database: postgres

postgres:
  host: localhost
  port: 5432
  database: postgres
  user: postgres
  password: postgres
  schema_name: private_gpt

ollama:
  llm_model: qwen3:4b
  embedding_model_text: nomic-embed-text
  embedding_model_code: vuongnguyen2212/CodeRankEmbed
  worker_llm: qwen2.5:0.5b
  code_llm: qwen2.5-coder:3b
  code_summary_mode: all # can be: all, code, summarized
  vision_llm: qwen3-vl:4b
  api_base: http://localhost:11434
  embedding_api_base: http://localhost:11434
  keep_alive: 5m
  autopull_models: false
  tfs_z: 1.0 # Tail free sampling is used to reduce the impact of less probable tokens from the output. A higher value (e.g., 2.0) will reduce the impact more, while a value of 1.0 disables this setting.
  top_k: 40 # Reduces the probability of generating nonsense. A higher value (e.g. 100) will give more diverse answers, while a lower value (e.g. 10) will be more conservative. (Default: 40)
  top_p: 0.9 # Works together with top-k. A higher value (e.g., 0.95) will lead to more diverse text, while a lower value (e.g., 0.5) will generate more focused and conservative text. (Default: 0.9)
  repeat_last_n: 64 # Sets how far back for the model to look back to prevent repetition. (Default: 64, 0 = disabled, -1 = num_ctx)
  repeat_penalty: 1.2 # Sets how strongly to penalize repetitions. A higher value (e.g., 1.5) will penalize repetitions more strongly, while a lower value (e.g., 0.9) will be more lenient. (Default: 1.1)
  request_timeout: 120.0 # Time elapsed until ollama times out the request. Default is 120s. Format is float.
